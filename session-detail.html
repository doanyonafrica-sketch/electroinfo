<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Séance | ElectroInfo</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════════
           TOPBAR fixe en haut
        ═══════════════════════════════════════════ */
        #topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 52px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            gap: 1rem;
            z-index: 1000;
        }

        .tb-logo {
            font-weight: 800;
            font-size: 1rem;
            color: #60a5fa;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .tb-sep { width: 1px; height: 22px; background: #2d2d4e; flex-shrink: 0; }

        .tb-course-name {
            font-size: 0.85rem;
            color: #a0aec0;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tb-course-name strong { color: #e2e8f0; }

        .tb-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        .tb-progress {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.78rem;
            color: #a0aec0;
        }

        .progress-track {
            width: 100px;
            height: 5px;
            background: #2d2d4e;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #3b82f6;
            transition: width 0.4s;
        }

        .tb-btn {
            padding: 0.35rem 0.9rem;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            border: 1px solid #2d2d4e;
            color: #a0aec0;
            background: transparent;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
        }

        .tb-btn:hover { background: #2d2d4e; color: #fff; }

        /* ═══════════════════════════════════════════
           LAYOUT GLOBAL sous le topbar
        ═══════════════════════════════════════════ */
        #layout {
            display: flex;
            height: 100%;
            padding-top: 52px;
        }

        /* ═══════════════════════════════════════════
           SIDEBAR GAUCHE
        ═══════════════════════════════════════════ */
        #sidebar {
            width: 300px;
            min-width: 300px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.25s, min-width 0.25s;
        }

        #sidebar.hidden-sidebar {
            width: 0;
            min-width: 0;
            border-right: none;
        }

        .sidebar-head {
            padding: 1rem 1.25rem;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .sidebar-body {
            flex: 1;
            overflow-y: auto;
        }

        .sidebar-body::-webkit-scrollbar { width: 4px; }
        .sidebar-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

        .seq-block { border-bottom: 1px solid #e2e8f0; }

        .seq-title-row {
            padding: 0.75rem 1.25rem;
            font-size: 0.78rem;
            font-weight: 700;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .seq-title-row i { color: #3b82f6; font-size: 0.65rem; }

        .sess-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.7rem 1.25rem 0.7rem 1.5rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.15s;
        }

        .sess-item:hover { background: #f0f7ff; }

        .sess-item.active {
            background: #eff6ff;
            border-left-color: #2563eb;
        }

        .sess-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .sess-item.active .sess-icon {
            background: #2563eb;
            color: white;
        }

        .sess-icon i { font-size: 0.6rem; }

        .sess-text { flex: 1; min-width: 0; }

        .sess-num {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 0.1rem;
        }

        .sess-name {
            font-size: 0.85rem;
            color: #374151;
            line-height: 1.3;
        }

        .sess-item.active .sess-name {
            color: #1d4ed8;
            font-weight: 600;
        }

        /* ═══════════════════════════════════════════
           ZONE PRINCIPALE DE LECTURE
        ═══════════════════════════════════════════ */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* Bandeau séance en cours */
        #session-topband {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 3rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .band-left {}

        .band-seq {
            font-size: 0.75rem;
            font-weight: 700;
            color: #2563eb;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 0.3rem;
        }

        .band-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0f172a;
        }

        .band-toggle {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.85rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            background: white;
            color: #475569;
            font-size: 0.82rem;
            font-weight: 600;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .band-toggle:hover { background: #f8fafc; }

        /* Zone de lecture scrollable */
        #reader {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem 3rem 2rem;
            background: #ffffff;
        }

        #reader::-webkit-scrollbar { width: 7px; }
        #reader::-webkit-scrollbar-track { background: #f8fafc; }
        #reader::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        /* Largeur de lecture optimale */
        .reader-inner {
            max-width: 820px;
        }

        /* Contenu HTML injecté */
        #session-content {
            font-size: 1rem;
            line-height: 1.85;
            color: #1e293b;
        }

        /* PDF block */
        #pdf-block {
            margin-top: 3rem;
            padding: 1.5rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        #pdf-block i.pdf-icon { font-size: 2.5rem; color: #ef4444; flex-shrink: 0; }

        #pdf-block h4 { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }

        #pdf-block p { font-size: 0.85rem; color: #64748b; margin-bottom: 0.75rem; }

        .dl-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #1d4ed8;
            color: white;
            padding: 0.55rem 1.3rem;
            border-radius: 7px;
            font-weight: 700;
            font-size: 0.88rem;
            text-decoration: none;
            transition: background 0.2s;
        }

        .dl-btn:hover { background: #1e3a8a; }

        /* ═══════════════════════════════════════════
           BARRE DE NAVIGATION BAS
        ═══════════════════════════════════════════ */
        #bottomnav {
            background: white;
            border-top: 1px solid #e2e8f0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 3rem;
            flex-shrink: 0;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 1.5rem;
            border-radius: 7px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .nav-btn-prev {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .nav-btn-prev:hover:not(:disabled) { background: #e2e8f0; }

        .nav-btn-next {
            background: #1d4ed8;
            color: white;
        }

        .nav-btn-next:hover:not(:disabled) { background: #1e3a8a; }

        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .nav-info {
            text-align: center;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .nav-info strong {
            display: block;
            color: #334155;
            font-size: 0.92rem;
            margin-bottom: 0.1rem;
        }

        /* ═══════════════════════════════════════════
           LOADING / ERROR
        ═══════════════════════════════════════════ */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 9999;
            color: #64748b;
        }

        #loading-screen i { font-size: 2.5rem; color: #2563eb; }

        /* ═══════════════════════════════════════════
           RESPONSIVE MOBILE
        ═══════════════════════════════════════════ */
        @media (max-width: 768px) {
            html, body { overflow: auto; }
            #layout { flex-direction: column; height: auto; overflow: visible; padding-top: 52px; }
            #sidebar { width: 100%; min-width: 100%; border-right: none; border-bottom: 1px solid #e2e8f0; }
            #sidebar.hidden-sidebar { width: 100%; min-width: 100%; height: 0; overflow: hidden; }
            #reader { padding: 1.5rem 1.25rem; overflow: visible; }
            #session-topband { padding: 1rem 1.25rem; }
            .band-title { font-size: 1.15rem; }
            #bottomnav { padding: 0 1rem; }
            .nav-btn { padding: 0.5rem 1rem; font-size: 0.82rem; }
        }
    </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
    <i class="fas fa-spinner fa-spin"></i>
    <p>Chargement de la séance...</p>
</div>

<!-- TOPBAR -->
<div id="topbar">
    <a href="index.html" class="tb-logo">
        <i class="fas fa-bolt"></i> ElectroInfo
    </a>
    <div class="tb-sep"></div>
    <div class="tb-course-name" id="tbCourseName">Chargement...</div>
    <div class="tb-right">
        <div class="tb-progress">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
            <span id="progressText">0%</span>
        </div>
        <a id="backLink" href="courses.html" class="tb-btn">
            <i class="fas fa-th-large"></i> Tous les cours
        </a>
    </div>
</div>

<!-- LAYOUT PRINCIPAL -->
<div id="layout">

    <!-- SIDEBAR -->
    <aside id="sidebar">
        <div class="sidebar-head">Plan du cours</div>
        <div class="sidebar-body" id="sidebarNav">
            <!-- injecté par JS -->
        </div>
    </aside>

    <!-- ZONE DE LECTURE -->
    <div id="main">

        <!-- Bandeau titre séance -->
        <div id="session-topband">
            <div class="band-left">
                <div class="band-seq" id="bandSeq"></div>
                <div class="band-title" id="bandTitle">Séance</div>
            </div>
            <button class="band-toggle" onclick="toggleSidebar()">
                <i class="fas fa-list-ul"></i> Plan
            </button>
        </div>

        <!-- Lecteur scrollable -->
        <div id="reader">
            <div class="reader-inner">
                <div id="session-content">
                    <!-- HTML du cours injecté ici -->
                </div>
                <div id="pdf-block" style="display:none;">
                    <i class="fas fa-file-pdf pdf-icon"></i>
                    <div>
                        <h4>Document PDF</h4>
                        <p>Téléchargez le document complémentaire de cette séance.</p>
                        <a id="pdfLink" href="#" target="_blank" class="dl-btn">
                            <i class="fas fa-download"></i> Télécharger le PDF
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Barre navigation -->
        <div id="bottomnav">
            <button class="nav-btn nav-btn-prev" id="prevBtn" onclick="navigate(-1)">
                <i class="fas fa-chevron-left"></i> Précédent
            </button>
            <div class="nav-info">
                <strong id="navTitle"></strong>
                <span id="navCounter"></span>
            </div>
            <button class="nav-btn nav-btn-next" id="nextBtn" onclick="navigate(1)">
                Suivant <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script type="module" src="courses.js"></script>
<script>
    let sidebarVisible = true;
    function toggleSidebar() {
        sidebarVisible = !sidebarVisible;
        document.getElementById('sidebar').classList.toggle('hidden-sidebar', !sidebarVisible);
    }
</script>
</body>
</html>
